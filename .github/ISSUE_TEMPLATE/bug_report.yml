name: Bug report
description: Something behaves incorrectly
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: Include the full exception with its type, for example ChordProtocolException.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true
  - type: input
    id: chord-version
    attributes:
      label: CHord version or commit
    validations:
      required: true
  - type: input
    id: clickhouse-version
    attributes:
      label: ClickHouse server version
      description: SELECT version(), or the Docker image tag.
    validations:
      required: true
  - type: input
    id: java-version
    attributes:
      label: Java version
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: How to reproduce
      description: Smallest possible code and schema. Redact credentials and sensitive queries.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: TRACE logs of io.github.orhaugh.chord show packet kinds without payloads.
