name: Feature request
description: Propose new functionality
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that CHord cannot do today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behaviour
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: input
    id: roadmap
    attributes:
      label: Roadmap phase
      description: If this maps to a phase in docs/unsupported-features.md, name it.
