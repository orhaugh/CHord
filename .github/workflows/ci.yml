name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and unit tests (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ['21', '23', '25']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven
      - name: Verify
        # Static analysis runs once, on the Java 21 baseline; the artifacts are
        # release 21 bytecode, so re-analysing per JDK adds lag risk, not signal.
        run: >
          ./mvnw -B -ntp verify
          ${{ matrix.java != '21' && '-Dspotbugs.skip=true' || '' }}

  coverage:
    name: Coverage report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Verify with coverage
        run: ./mvnw -B -ntp -Pcoverage verify
      - uses: actions/upload-artifact@v7
        with:
          name: jacoco-reports
          path: '**/target/site/jacoco/**'
          retention-days: 14

  integration:
    name: Integration tests (ClickHouse ${{ matrix.clickhouse }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        clickhouse: ['25.8', '26.3']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Integration tests
        run: >
          ./mvnw -B -ntp -Pintegration-tests verify
          -Dchord.testkit.clickhouse.image=clickhouse/clickhouse-server:${{ matrix.clickhouse }}

  benchmarks-compile:
    name: Benchmarks compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Package benchmarks
        run: ./mvnw -B -ntp -Pbenchmarks package -DskipTests
