name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Build, sign and validate without uploading to Maven Central
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  publish:
    name: Publish to Maven Central
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE
      - name: Deploy
        run: ./mvnw -B -ntp -Prelease deploy -DskipPublishing=${{ inputs.dry_run }}
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
      - name: Attach SBOM and artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-artifacts
          path: |
            **/target/*.jar
            **/target/bom.json
            **/target/bom.xml
          retention-days: 30
