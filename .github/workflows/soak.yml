name: Soak

on:
  workflow_dispatch:
    inputs:
      seconds:
        description: Soak duration in seconds (7200 = the two hour release gate)
        type: string
        default: "7200"
      image:
        description: ClickHouse server image
        type: string
        default: clickhouse/clickhouse-server:25.8

permissions:
  contents: read

jobs:
  soak:
    name: Mixed workload soak
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Soak
        run: >
          ./mvnw -B -ntp -Pintegration-tests verify -pl chord-client -am
          -Dit.test=SoakIT
          -Dchord.soak.seconds=${{ inputs.seconds }}
          -Dchord.testkit.clickhouse.image=${{ inputs.image }}
          -Dfailsafe.failIfNoSpecifiedTests=false
          -Dsurefire.failIfNoSpecifiedTests=false
      - name: Keep the report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: soak-report
          path: chord-client/target/failsafe-reports/
          retention-days: 30
